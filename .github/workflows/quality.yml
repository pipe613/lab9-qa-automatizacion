# .github/workflows/quality.yml
name: Quality Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: pip install pytest pytest-cov behave
      
    - name: Run pytest with coverage gate
      run: pytest tests/ -v --cov=app --cov-report=xml --cov-fail-under=80
      
    - name: Run BDD scenarios
      run: behave features/